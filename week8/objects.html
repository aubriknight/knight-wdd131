<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="objects.css">
    <script src="objects.js" defer></script>
</head>

<body>
    <h1 id="courseName"></h1>
    <h2 id="courseCode"></h2>
    <label for="sectionNumber">Section Number</label>
    <input id="sectionNumber" />
    <button id="enrollStudent">Enroll Student</button>
    <table>
        <thead>
            <tr>
                <th>Section#</th>
                <th>Room#</th>
                <th>#Enrolled</th>
                <th>Days</th>
                <th>Instructor</th>
            </tr>
        </thead>
        <tbody id="sections"></tbody>
    </table>

    <h3>Add New Section</h3>
    <form id="newSectionForm">
        <label for="newSectionNumber">Section Number:</label>
        <input id="newSectionNumber" type="text" required>
        
        <label for="roomNumber">Room Number:</label>
        <input id="roomNumber" type="text" required>
        
        <label for="days">Days:</label>
        <input id="days" type="text" required>
        
        <label for="instructor">Instructor:</label>
        <input id="instructor" type="text" required>

        <label for="enrolled">Enrolled Students:</label>
        <input id="enrolled" type="number" min="0" required>    
        
        <button type="submit">Add Section</button>
    </form>

</body>

</html>
