<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="recipe.css">
    <script src="recipe.js" defer></script>
</head>

<body>
    <nav>
        <div class="page-title">
            <img class="logo" src="images/recipe-book.png" alt="Logo">
            <h1>RecipeBook</h1>
        </div>
        <search>
            <input type="text" placeholder="Find a recipe">
            <button class="search-button" type="submit">Search</button>
        </search>
    </nav>

    <main>
        <div class="recipe-card">
            <img class="recipe-image" src="images/apple-crisp.jpg" alt="Recipe Image">
            <div class="recipe-info">
                <button class="tag-button" type="button">Dessert</button>
                <h2>Apple Crisp</h2>
                <p class="rating">⭐⭐⭐⭐☆</p>
                <p class="description">This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla icecream.</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img class="social-icon" src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img class="social-icon" src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img class="social-icon" src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik -
            Flaticon</a>
    </footer>


</body>

</html>
